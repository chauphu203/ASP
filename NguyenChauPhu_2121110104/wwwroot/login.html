<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng nhập | Quản lý sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="lib/adminlte/css/adminlte.min.css" />
  </head>
  <body class="login-page bg-body-secondary">
    <div class="login-box">
      <div class="login-logo"><b>QLSV</b> & Điểm danh</div>
      <div class="card">
        <div class="card-body login-card-body">
          <p class="login-box-msg">Đăng nhập để vào hệ thống</p>
          <div class="mb-3">
            <div class="input-group">
              <input type="text" id="username" class="form-control" placeholder="Tên đăng nhập" autocomplete="username" />
              <span class="input-group-text"><i class="bi bi-person"></i></span>
            </div>
          </div>
          <div class="mb-3">
            <div class="input-group">
              <input type="password" id="password" class="form-control" placeholder="Mật khẩu" autocomplete="current-password" />
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            </div>
          </div>
          <div class="d-grid gap-2 mb-2">
            <button type="button" id="btnLogin" class="btn btn-primary">Đăng nhập</button>
          </div>
          <p id="loginErr" class="text-danger small mb-0 d-none"></p>
          <p class="mb-0 mt-2 text-center small">
            <a href="/register.html">Chưa có tài khoản? Đăng ký</a>
          </p>
          <p class="mb-0 mt-3 text-center small">
            <a href="/swagger" target="_blank" rel="noopener">Mở Swagger (thử API)</a>
          </p>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="lib/adminlte/js/adminlte.min.js"></script>
    <script>
      document.getElementById('btnLogin').addEventListener('click', async () => {
        const err = document.getElementById('loginErr');
        err.classList.add('d-none');
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        if (!username || !password) {
          err.textContent = 'Nhập đủ tên đăng nhập và mật khẩu.';
          err.classList.remove('d-none');
          return;
        }
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          err.textContent = typeof data === 'string' ? data : data.message || 'Đăng nhập thất bại.';
          err.classList.remove('d-none');
          return;
        }
        localStorage.setItem('accessToken', data.accessToken || data.AccessToken);
        localStorage.setItem('username', data.username);
        location.href = '/';
      });
    </script>
  </body>
</html>
